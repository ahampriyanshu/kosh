name: Feed — indices

on:
  schedule:
    - cron: '30 20 * * 0-4'   # 02:00 IST Mon-Fri
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx tsx scripts/feed-indices.ts

      - name: Commit slice
        run: |
          git config user.name "kosh-bot"
          git config user.email "kosh-bot@users.noreply.github.com"
          git pull --rebase --autostash
          git add data/feed
          git diff --staged --quiet || git commit -m "chore(feed): indices $(date -u +%F)"
          git push
