name: Retro (mid-session)

on:
  schedule:
    - cron: '57 13 * * 1-5' # Targets 14:00 IST, weekdays; avoids crowded quarter-hour scheduler slots.
      timezone: "Asia/Kolkata"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  retro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx tsx scripts/retro.ts
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY_FALLBACK_1: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY_FALLBACK_1 }}
          GOOGLE_GENERATIVE_AI_API_KEY_FALLBACK_2: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY_FALLBACK_2 }}
          KOSH_GOOGLE_MODEL: ${{ secrets.KOSH_GOOGLE_MODEL }}
          KOSH_GOOGLE_MODEL_FALLBACK_1: ${{ secrets.KOSH_GOOGLE_MODEL_FALLBACK_1 }}
          KOSH_GOOGLE_MODEL_FALLBACK_2: ${{ secrets.KOSH_GOOGLE_MODEL_FALLBACK_2 }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          KOSH_EMAIL_FROM: ${{ secrets.KOSH_EMAIL_FROM }}
          KOSH_EMAIL_REPLY_TO: ${{ secrets.KOSH_EMAIL_REPLY_TO }}
          KOSH_EMAIL_TO: ${{ secrets.KOSH_EMAIL_TO }}
          KOSH_PORTFOLIO_KEY: ${{ secrets.KOSH_PORTFOLIO_KEY }}

      - name: Commit report
        run: |
          git config user.name "kosh-bot"
          git config user.email "kosh-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore(data): mid-session $(date -u +%Y-%m-%d)"
          git push
