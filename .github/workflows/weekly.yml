name: Weekly Recap

on:
  schedule:
    - cron: '57 20 * * 0' # Targets Sun 21:00 IST; avoids crowded quarter-hour scheduler slots.
      timezone: "Asia/Kolkata"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx tsx scripts/weekly.ts
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY_FALLBACK_1: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY_FALLBACK_1 }}
          GOOGLE_GENERATIVE_AI_API_KEY_FALLBACK_2: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY_FALLBACK_2 }}
          GOOGLE_MODEL: ${{ secrets.GOOGLE_MODEL }}
          GOOGLE_MODEL_FALLBACK_1: ${{ secrets.GOOGLE_MODEL_FALLBACK_1 }}
          GOOGLE_MODEL_FALLBACK_2: ${{ secrets.GOOGLE_MODEL_FALLBACK_2 }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Commit report
        run: |
          git config user.name "kosh-bot"
          git config user.email "kosh-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore(data): weekly recap $(date -u +%Y-%m-%d)"
          git push
