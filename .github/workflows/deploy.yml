name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'data/reports/**'
      - 'data/snapshots/**'
      - 'data/ledger/**'
      - 'data/portfolio.json'
      - 'data/manifest.json'
      - 'src/**'
      - 'lib/**'
      - '.github/workflows/deploy.yml'
      - 'next.config.ts'
      - 'package.json'
  workflow_run:
    workflows:
      - Daily brief
      - Retro (mid-session)
      - Weekly Recap
      - Recap (weekly grading)
      - Monthly Recap
      - Research
      - Portfolio sync
    types:
      - completed
    branches:
      - main
  workflow_dispatch: {}

# Allow the GITHUB_TOKEN to deploy to Pages, and read the repo.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress deploy (let it finish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build static export
        run: npx next build

      # Prevent GitHub Pages' Jekyll from stripping Next's _next/ directory.
      - run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
