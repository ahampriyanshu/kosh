name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'data/reports/**'
      - 'data/snapshots/**'
      - 'data/ledger/**'
      - 'src/**'
      - 'lib/**'
      - 'next.config.ts'
      - 'package.json'
  workflow_dispatch: {}

# Allow the GITHUB_TOKEN to deploy to Pages, and read the repo.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress deploy (let it finish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static export
        run: npx next build

      # Prevent GitHub Pages' Jekyll from stripping Next's _next/ directory.
      - run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
