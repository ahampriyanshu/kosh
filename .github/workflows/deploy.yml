name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Allow the GITHUB_TOKEN to deploy to Pages, and read the repo.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress deploy (let it finish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Project site (user.github.io/REPO) needs basePath '/REPO'; a user/org root
      # site (REPO == user.github.io) needs an empty basePath.
      - name: Compute base path
        id: bp
        run: |
          REPO="${{ github.event.repository.name }}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static export
        run: npx next build
        env:
          PAGES_BASE_PATH: ${{ steps.bp.outputs.path }}

      # Prevent GitHub Pages' Jekyll from stripping Next's _next/ directory.
      - run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
