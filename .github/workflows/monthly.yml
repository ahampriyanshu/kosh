name: Monthly Recap

on:
  schedule:
    # Runs 18:30 UTC on days 28–31 (== 00:00 IST on days 29–1). scripts/monthly.ts
    # proceeds only when the IST date is the 1st, so it fires exactly once per month.
    - cron: '30 18 28-31 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  monthly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx tsx scripts/monthly.ts
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          KOSH_GOOGLE_MODEL: ${{ secrets.KOSH_GOOGLE_MODEL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          KOSH_EMAIL_FROM: ${{ secrets.KOSH_EMAIL_FROM }}
          KOSH_EMAIL_REPLY_TO: ${{ secrets.KOSH_EMAIL_REPLY_TO }}
          KOSH_EMAIL_TO: ${{ secrets.KOSH_EMAIL_TO }}

      - name: Commit report
        run: |
          git config user.name "kosh-bot"
          git config user.email "kosh-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore(data): monthly recap $(date -u +%Y-%m)"
          git push
