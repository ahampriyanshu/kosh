name: Snapshot — merge

on:
  schedule:
    - cron: '30 2 * * 1-5'   # 08:00 IST Mon-Fri
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx tsx scripts/merge-snapshot.ts

      - name: Commit snapshot (and remove feed slices)
        run: |
          git config user.name "kosh-bot"
          git config user.email "kosh-bot@users.noreply.github.com"
          git pull --rebase --autostash
          git add -A data/snapshots data/feed
          git diff --staged --quiet || git commit -m "chore(snapshot): $(date -u +%F)"
          git push
