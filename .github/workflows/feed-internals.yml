name: Feed — internals

on:
  schedule:
    - cron: '43 2 * * 1-5'   # Targets 02:45 IST Mon-Fri; avoids crowded quarter-hour scheduler slots.
      timezone: "Asia/Kolkata"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx tsx scripts/feed-internals.ts

      - name: Commit slice
        run: |
          git config user.name "kosh-bot"
          git config user.email "kosh-bot@users.noreply.github.com"
          git pull --rebase --autostash
          git add data/feed
          git diff --staged --quiet || git commit -m "chore(feed): internals $(date -u +%F)"
          git push
