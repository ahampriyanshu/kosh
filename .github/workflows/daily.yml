name: Daily brief

on:
  schedule:
    - cron: '57 7 * * 1-5' # Targets 08:00 IST, weekdays; avoids crowded quarter-hour scheduler slots.
      timezone: "Asia/Kolkata"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx tsx scripts/daily.ts
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          KOSH_GOOGLE_MODEL: ${{ secrets.KOSH_GOOGLE_MODEL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          KOSH_EMAIL_FROM: ${{ secrets.KOSH_EMAIL_FROM }}
          KOSH_EMAIL_REPLY_TO: ${{ secrets.KOSH_EMAIL_REPLY_TO }}
          KOSH_EMAIL_TO: ${{ secrets.KOSH_EMAIL_TO }}

      - name: Commit snapshot + briefing (stages report, snapshot, and feed-slice cleanup)
        run: |
          git config user.name "kosh-bot"
          git config user.email "kosh-bot@users.noreply.github.com"
          git pull --rebase --autostash
          git add -A data/
          git diff --staged --quiet || git commit -m "chore(data): daily brief $(date -u +%Y-%m-%d)"
          git push
