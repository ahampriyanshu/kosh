name: Feed — flows

on:
  schedule:
    - cron: '27 6 * * 1-5'   # Targets 06:30 IST Mon-Fri; avoids crowded quarter-hour scheduler slots.
      timezone: "Asia/Kolkata"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx tsx scripts/feed-flows.ts
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY_FALLBACK_1: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY_FALLBACK_1 }}
          GOOGLE_GENERATIVE_AI_API_KEY_FALLBACK_2: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY_FALLBACK_2 }}
          GOOGLE_MODEL: ${{ secrets.GOOGLE_MODEL }}
          GOOGLE_MODEL_FALLBACK_1: ${{ secrets.GOOGLE_MODEL_FALLBACK_1 }}
          GOOGLE_MODEL_FALLBACK_2: ${{ secrets.GOOGLE_MODEL_FALLBACK_2 }}

      - name: Commit slice
        run: |
          git config user.name "kosh-bot"
          git config user.email "kosh-bot@users.noreply.github.com"
          git pull --rebase --autostash
          git add data/feed
          git diff --staged --quiet || git commit -m "chore(feed): flows $(date -u +%F)"
          git push
