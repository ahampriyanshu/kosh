name: Recap (weekly grading)

on:
  schedule:
    - cron: '57 9 * * 6'   # Targets Saturday 10:00 IST; avoids crowded quarter-hour scheduler slots.
      timezone: "Asia/Kolkata"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx tsx scripts/recap.ts
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Commit recap + ledger
        run: |
          git config user.name "kosh-bot"
          git config user.email "kosh-bot@users.noreply.github.com"
          git pull --rebase --autostash
          git add -A data/
          git diff --staged --quiet || git commit -m "chore(data): recap $(date -u +%F)"
          git push
